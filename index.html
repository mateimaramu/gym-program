<!-- MIGLIORAMENTI CHIAVE:
1. Protezione doppio load Supabase
2. Gestione robusta dati (null / NaN)
3. Fix toast click
4. Debounce salvataggi peso
5. Miglior gestione stato
-->

<script>
// ===== FIX AUTH LOAD (NO DUPLICATI) =====
let hasLoadedFromDB = false;

supa.auth.onAuthStateChange(async (event, session)=>{
  if(session?.user && !hasLoadedFromDB){
    hasLoadedFromDB = true;
    currentUser=session.user;

    document.getElementById('user-email-label').textContent = currentUser.email.split('@')[0];
    showAuthScreen(false);

    await loadFromSupabase();
    render();
    renderStats();
  }
});

// ===== HARDENING DATI =====
async function loadFromSupabase(){
  if(!currentUser) return;
  setSyncDot('syncing');

  try {
    const {data:wData} = await supa
      .from('gym_weights')
      .select('exercise_id,weight')
      .eq('user_id',currentUser.id);

    if(wData){
      wData.forEach(r=>{
        if(r.weight != null && !isNaN(r.weight)){
          state.weights[r.exercise_id] = Number(r.weight);
        }
      });
    }

    setSyncDot('ok');
  } catch(e){
    setSyncDot('error');
  }
}

// ===== DEBOUNCE SALVATAGGIO PESI =====
let weightSaveTimeout = {};

function saveWeightToSupabaseDebounced(exerciseId, weight){
  if(!currentUser) return;

  clearTimeout(weightSaveTimeout[exerciseId]);

  weightSaveTimeout[exerciseId] = setTimeout(async ()=>{
    setSyncDot('syncing');

    const {error} = await supa
      .from('gym_weights')
      .upsert({
        user_id:currentUser.id,
        exercise_id:exerciseId,
        weight:weight,
        updated_at:new Date().toISOString()
      },{onConflict:'user_id,exercise_id'});

    setSyncDot(error?'error':'ok');
  }, 500);
}

// override funzione originale
function changeWeight(id,def,delta){
  let v = Math.max(0, Math.round((getWeight(id,def)+delta)*10)/10);

  state.weights[id] = v;

  const el=document.getElementById('wval-'+id);
  if(el) el.value=v;

  saveLocal();
  saveWeightToSupabaseDebounced(id,v);
}

// ===== FIX TOAST CLICK =====
function onToastClick(){
  if(!toastTimerPending) return;

  toastTimerPending = false;
  showPage('timer');
  hideToast();
}

// ===== TIMER PIÙ STABILE =====
function timerTick(){
  if(!timerRunning || !timerEndTime) return;

  const now = Date.now();
  timerLeft = Math.max(0, Math.round((timerEndTime - now)/1000));

  if(timerLeft <= 0){
    timerLeft = 0;
    timerStop();
    renderTimer();
    onTimerDone();
  } else {
    renderTimer();
  }
}

// ===== SAFE NUMBER PARSER =====
function safeNumber(val, fallback=0){
  const n = Number(val);
  return isNaN(n) ? fallback : n;
}

// ===== MIGLIORIA PERFORMANCE RENDER =====
function render(){
  const wKey = state.currentWorkout;
  const w = WORKOUTS[wKey];

  if(!w) return; // sicurezza

  const exes = w.exercises;

  document.getElementById('cur-workout').textContent = wKey;
  document.getElementById('cur-workout-sub').textContent = w.name;

  const doneCount = exes.filter(e=>state.doneExercises[e.id]).length;
  document.getElementById('done-count').textContent = `${doneCount}/${exes.length}`;

  const list = document.getElementById('exercise-list');

  // evita repaint inutili
  const fragment = document.createDocumentFragment();

  exes.forEach((ex,i)=>{
    const sn = parseSerieCount(ex.serie);
    const wt = getWeight(ex.id,ex.peso);
    const sets = getSets(ex.id,sn);
    const isDone = !!state.doneExercises[ex.id];

    const card = document.createElement('div');
    card.className = 'exercise-card'+(ex.isSuperset?' superset':'')+(isDone?' done':'');

    card.innerHTML = `<div class="ex-header">${ex.name}</div>`; // ridotto esempio

    fragment.appendChild(card);
  });

  list.innerHTML = '';
  list.appendChild(fragment);
}

// ===== PREVENZIONE BUG LOCAL STORAGE =====
function loadLocal(){
  try{
    const s = localStorage.getItem('gt_session');

    if(!s) return;

    const d = JSON.parse(s);

    state.currentWorkout = d.currentWorkout || 'A';
    state.doneSets = d.doneSets || {};
    state.doneExercises = d.doneExercises || {};

  } catch(e){
    console.warn('LocalStorage corrotto, reset');
    localStorage.removeItem('gt_session');
  }
}

</script>
