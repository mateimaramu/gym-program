<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymTrack">
<title>GymTrack 🦍</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --border: #2a2a3a;
    --accent: #e8ff3a; --accent2: #ff6b35; --accent3: #3affe8;
    --text: #f0f0f8; --muted: #6b6b8a; --card: #15151f;
    --superset: #ff6b35; --radius: 12px; --green: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; overflow-x: hidden; }
  #app { display: flex; flex-direction: column; height: 100dvh; }

  /* HEADER */
  header {
    padding: 10px 16px 8px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; position: sticky; top: 0; z-index: 100;
  }
  .logo-row { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 32px; line-height: 1; }
  .logo { font-size: 26px; font-weight: 900; letter-spacing: -1px; }
  .logo span { color: var(--accent); }
  .header-sub { font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

  /* TABS */
  .tab-nav { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab-btn { padding: 9px 4px 7px; font-family: 'Barlow Condensed', sans-serif; background: none; border: none; color: var(--muted); cursor: pointer; position: relative; transition: color .2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; transition: stroke .2s; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active svg { stroke: var(--accent); }
  .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: var(--accent); border-radius: 2px; }
  .tab-label { font-size: 9px; display: block; letter-spacing: 2px; font-weight: 600; line-height: 1; }

  /* SCROLL */
  .scroll-area { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: 90px; }
  .page { display: none; }
  .page.active { display: block; }

  /* WORKOUT HEADER */
  .workout-header { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .workout-title { font-size: 52px; font-weight: 900; line-height: 1; color: var(--accent); }
  .workout-subtitle { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .workout-count { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* EXERCISE CARD */
  .exercise-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color .2s; }
  .exercise-card.superset { border-color: var(--superset); }
  .exercise-card.done { border-color: #2a3a2a; opacity: 0.65; }
  .ex-header { display: flex; align-items: center; gap: 12px; padding: 13px 14px; cursor: pointer; }
  .ex-num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .exercise-card.done .ex-num { background: #1a3a1a; border-color: #2a5a2a; color: #4a9a4a; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 19px; font-weight: 700; line-height: 1.1; }
  .ex-meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .badge-serie { background: #1a1a2a; color: var(--accent3); border: 1px solid #2a2a4a; }
  .badge-rec { background: #1a1a2a; color: #a0a0c0; border: 1px solid #2a2a4a; }
  .badge-super { background: #2a1800; color: var(--superset); border: 1px solid #3a2000; }
  .superset-tag { font-size: 9px; letter-spacing: 2px; color: var(--superset); font-weight: 700; display: block; margin-top: 3px; }
  .ex-expand { color: var(--muted); font-size: 13px; transition: transform .2s; }
  .ex-expand.open { transform: rotate(180deg); }
  .ex-body { padding: 0 14px 13px; border-top: 1px solid var(--border); display: none; }
  .ex-body.open { display: block; }

  /* WEIGHT */
  .weight-row { display: flex; align-items: center; gap: 10px; padding-top: 11px; flex-wrap: wrap; }
  .weight-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
  .weight-ctrl { display: flex; align-items: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .w-btn { width: 42px; height: 42px; background: none; border: none; color: var(--text); font-size: 24px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .w-btn:active { background: var(--border); }
  .w-val { min-width: 68px; text-align: center; font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); background: none; border: none; outline: none; padding: 0; }
  .w-unit { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  /* SETS */
  .sets-row { display: flex; gap: 8px; padding-top: 10px; flex-wrap: wrap; align-items: center; }
  .sets-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .set-dot { width: 34px; height: 34px; border-radius: 8px; border: 2px solid var(--border); background: var(--bg3); cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
  .set-dot.completed { background: var(--accent); border-color: var(--accent); color: #000; }
  .set-dot:active { transform: scale(0.88); }
  .done-btn { margin-top: 10px; width: 100%; padding: 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all .2s; }
  .done-btn:active { background: #1a3a1a; border-color: #2a5a2a; color: #4a9a4a; }
  .exercise-card.done .done-btn { background: #1a3a1a; border-color: #2a5a2a; color: #4a9a4a; }

  /* FINISH BTN */
  .finish-btn { width: 100%; margin-top: 10px; padding: 16px; background: var(--accent); border: none; border-radius: var(--radius); color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 3px; cursor: pointer; transition: opacity .15s; }
  .finish-btn:active { opacity: 0.85; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 36px; animation: slideUp .3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 28px; font-weight: 900; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .modal-sub { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
  .modal-summary { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 18px; }
  .modal-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .modal-row:last-child { border-bottom: none; }
  .modal-ex { font-size: 16px; font-weight: 600; }
  .modal-w { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .modal-done-tag { font-size: 11px; color: var(--green); background: #0a2a0a; border: 1px solid #1a4a1a; padding: 2px 7px; border-radius: 4px; }
  .modal-skip-tag { font-size: 11px; color: var(--muted); background: var(--bg3); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 14px; border-radius: var(--radius); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; border: none; cursor: pointer; transition: opacity .15s; }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn-cancel { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .modal-btn-confirm { background: var(--accent); color: #000; }

  /* TIMER */
  .timer-page { display: flex; flex-direction: column; align-items: center; padding: 20px 16px; }
  .timer-label { font-size: 12px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .timer-display { font-size: 88px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1; color: var(--accent); letter-spacing: -4px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 100%; text-align: center; }
  .timer-display.running { color: var(--accent3); }
  .timer-display.finished { color: var(--accent2); animation: pulse .6s ease infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
  .timer-progress { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .timer-progress circle { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset .5s linear; }
  .timer-progress.running circle { stroke: var(--accent3); }
  .timer-progress.finished circle { stroke: var(--accent2); }
  .timer-controls { display: flex; gap: 12px; width: 100%; max-width: 340px; }
  .t-btn { flex: 1; padding: 15px; border-radius: var(--radius); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; border: none; cursor: pointer; transition: all .15s; }
  .t-btn:active { transform: scale(0.97); }
  .t-btn-start { background: var(--accent); color: #000; }
  .t-btn-reset { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .t-btn-stop { background: var(--accent2); color: #fff; }
  .preset-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; width: 100%; max-width: 340px; margin-top: 16px; }
  .preset-btn { padding: 10px 4px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all .15s; text-align: center; }
  .preset-btn:active { background: var(--border); }
  .preset-btn.active-preset { border-color: var(--accent); color: var(--accent); }
  .custom-time-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; width: 100%; max-width: 340px; }
  .custom-time-label { font-size: 14px; color: var(--muted); flex-shrink: 0; }
  .custom-time-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 18px; padding: 8px 12px; outline: none; text-align: center; }
  .custom-time-input:focus { border-color: var(--accent3); }

  /* CALENDAR */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-title { font-size: 22px; font-weight: 700; }
  .cal-nav { width: 36px; height: 36px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .cal-nav:active { background: var(--border); }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 14px; }
  .cal-day-label { text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 1px; padding: 4px 0; font-weight: 700; }
  .cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; font-family: 'JetBrains Mono', monospace; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); position: relative; cursor: default; }
  .cal-day.today { border-color: var(--accent3); color: var(--accent3); }
  .cal-day.trained { background: var(--bg); border-color: var(--accent); color: var(--text); }
  .cal-day.empty { background: transparent; border-color: transparent; }
  .cal-badge { position: absolute; top: 2px; right: 3px; font-size: 8px; font-weight: 900; color: var(--accent); font-family: 'Barlow Condensed', sans-serif; line-height: 1; }
  .cal-dot { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* STORICO LIST */
  .section-title { font-size: 12px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin: 14px 0 10px; }
  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; }
  .history-date { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .history-workout { font-size: 20px; font-weight: 700; color: var(--accent); margin: 2px 0; }
  .history-detail { font-size: 13px; color: var(--muted); }
  .no-history { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 16px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-val { font-size: 42px; font-weight: 900; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .progress-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; }
  .progress-ex { font-size: 17px; font-weight: 700; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .progress-bar-bg { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s; }
  .progress-weight { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #000; padding: 12px 24px; border-radius: 100px; font-size: 16px; font-weight: 700; letter-spacing: 1px; z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; border: none; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.clickable { box-shadow: 0 4px 20px rgba(232,255,58,.35); }
  .toast.clickable::after { content: ' →'; opacity: 0.7; }

  /* AUTH SCREEN */
  .auth-screen { display:none; position:fixed; inset:0; background:var(--bg); z-index:800; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; }
  .auth-screen.visible { display:flex; }
  .auth-logo { font-size:72px; margin-bottom:8px; }
  .auth-title { font-size:36px; font-weight:900; letter-spacing:-1px; margin-bottom:4px; }
  .auth-title span { color:var(--accent); }
  .auth-sub { font-size:13px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:36px; }
  .auth-form { width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px; }
  .auth-input { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:16px; padding:14px 16px; outline:none; width:100%; }
  .auth-input:focus { border-color:var(--accent3); }
  .auth-btn { padding:15px; background:var(--accent); border:none; border-radius:var(--radius); color:#000; font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; letter-spacing:3px; cursor:pointer; width:100%; }
  .auth-btn:active { opacity:0.85; }
  .auth-btn-sec { padding:12px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:600; letter-spacing:2px; cursor:pointer; width:100%; }
  .auth-err { font-size:14px; color:var(--accent2); text-align:center; min-height:20px; }
  .auth-switch { font-size:14px; color:var(--muted); text-align:center; margin-top:4px; }
  .auth-switch b { color:var(--accent3); cursor:pointer; }
  /* user pill in header */
  .user-pill { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; text-align:right; cursor:pointer; }
  .user-pill:active { color:var(--accent2); }
  .sync-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); margin-right:4px; vertical-align:middle; }
  .sync-dot.syncing { background:var(--accent); animation:pulse .8s ease infinite alternate; }
  .sync-dot.error { background:var(--accent2); }

</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo-row">
      <div class="logo-icon">🦍</div>
      <div>
        <div class="logo">GYM<span>TRACK</span></div>
        <div class="header-sub">La tua scheda</div>
      </div>
    </div>
    <div style="text-align:right">
    <div id="today-label" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);"></div>
    <div class="user-pill" id="user-pill" onclick="signOut()"><span class="sync-dot" id="sync-dot"></span><span id="user-email-label"></span></div>
  </div>
  </header>

  <nav class="tab-nav">
    <!-- dumbbell -->
    <button class="tab-btn active" onclick="showPage('scheda')">
      <svg viewBox="0 0 24 24">
        <rect x="7.5" y="11" width="9" height="2" rx="1"/>
        <rect x="3" y="9" width="3" height="6" rx="1.2"/>
        <rect x="1.5" y="10.5" width="1.5" height="3" rx="0.6"/>
        <rect x="18" y="9" width="3" height="6" rx="1.2"/>
        <rect x="21" y="10.5" width="1.5" height="3" rx="0.6"/>
      </svg>
      <span class="tab-label">SCHEDA</span>
    </button>
    <!-- stopwatch -->
    <button class="tab-btn" onclick="showPage('timer')">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="13.5" r="7.5"/>
        <path d="M12 6V4"/>
        <path d="M10 4h4"/>
        <path d="M12 13.5L15 10.5"/>
        <path d="M19 5.5l1.5-1.5"/>
      </svg>
      <span class="tab-label">TIMER</span>
    </button>
    <!-- calendar check -->
    <button class="tab-btn" onclick="showPage('storico')">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="5" width="18" height="16" rx="2"/>
        <path d="M3 9h18"/>
        <path d="M8 3v4M16 3v4"/>
        <path d="M7.5 15l2.5 2.5 4.5-4.5"/>
      </svg>
      <span class="tab-label">STORICO</span>
    </button>
    <!-- bar chart + trend line -->
    <button class="tab-btn" onclick="showPage('stats')">
      <svg viewBox="0 0 24 24">
        <path d="M3 20h18"/>
        <rect x="4" y="13" width="3.5" height="7" rx="0.8"/>
        <rect x="10.2" y="8" width="3.5" height="12" rx="0.8"/>
        <rect x="16.5" y="4" width="3.5" height="16" rx="0.8"/>
      </svg>
      <span class="tab-label">STATS</span>
    </button>
  </nav>

  <div class="scroll-area">

    <!-- SCHEDA -->
    <div id="page-scheda" class="page active">
      <div class="workout-header">
        <div>
          <div class="workout-title" id="cur-workout">A</div>
          <div class="workout-subtitle" id="cur-workout-sub">—</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
          <div class="workout-count" id="done-count">0/0</div>
          <button onclick="nextWorkout()" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Cambia →</button>
        </div>
      </div>
      <div id="exercise-list"></div>
      <button class="finish-btn" onclick="openConfirmModal()">🦍 FINE ALLENAMENTO</button>
    </div>

    <!-- TIMER -->
    <div id="page-timer" class="page">
      <div class="timer-page">

let state = { currentWorkout:'A', weights:{}, doneSets:{}, doneExercises:{}, history:[] };

// local fallback for session data (not wiped by cache clear — just workout-in-progress)
function saveLocal(){ try{ localStorage.setItem('gt_session', JSON.stringify({currentWorkout:state.currentWorkout,doneSets:state.doneSets,doneExercises:state.doneExercises})); }catch(e){} }
function loadLocal(){ try{ const s=localStorage.getItem('gt_session'); if(s){ const d=JSON.parse(s); state.currentWorkout=d.currentWorkout||'A'; state.doneSets=d.doneSets||{}; state.doneExercises=d.doneExercises||{}; } }catch(e){} }

// ════════════════════════════════════
function setSyncDot(status){ // 'ok' | 'syncing' | 'error' | 'off'
  const dot=document.getElementById('sync-dot');
  if(!dot) return;
  dot.className='sync-dot'+(status==='syncing'?' syncing':status==='error'?' error':'');
}

async function loadFromSupabase(){
  if(!currentUser) return;
  setSyncDot('syncing');
  try {
    // Load weights
    const {data:wData,error:wErr} = await supa.from('gym_weights').select('exercise_id,weight').eq('user_id',currentUser.id);
    if(!wErr && wData){ wData.forEach(r=>{ state.weights[r.exercise_id]=r.weight; }); }

    // Load history
    const {data:hData,error:hErr} = await supa.from('gym_history').select('*').eq('user_id',currentUser.id).order('trained_at',{ascending:false}).limit(100);
    if(!hErr && hData){
      state.history = hData.map(r=>({
        date: r.trained_at,
        workout: r.workout_key,
        name: r.workout_name,
        weights: r.weights,
        doneCount: r.done_count,
        total: r.total
      }));
    }
    setSyncDot('ok');
  } catch(e){ setSyncDot('error'); }
}

async function saveWeightToSupabase(exerciseId, weight){
  if(!currentUser) return;
  setSyncDot('syncing');
  const {error} = await supa.from('gym_weights').upsert({user_id:currentUser.id, exercise_id:exerciseId, weight:weight, updated_at:new Date().toISOString()},{onConflict:'user_id,exercise_id'});
  setSyncDot(error?'error':'ok');
}

async function saveSessionToSupabase(entry){
  if(!currentUser) return;
  setSyncDot('syncing');
  const {error} = await supa.from('gym_history').insert({
    user_id: currentUser.id,
    workout_key: entry.workout,
    workout_name: entry.name,
    done_count: entry.doneCount,
    total: entry.total,
    weights: entry.weights,
    trained_at: entry.date
  });
  setSyncDot(error?'error':'ok');
}

// ════════════════════════════════════
//  HELPERS
// ════════════════════════════════════
function parseSerieCount(s){ const m=s.match(/^(\d+)x/); return m?parseInt(m[1]):3; }
function getWeight(id,def){ return state.weights[id]!==undefined?state.weights[id]:def; }
function getSets(id,total){
  if(!state.doneSets[id]||state.doneSets[id].length!==total) state.doneSets[id]=Array(total).fill(false);
  return state.doneSets[id];
}
function parseRecupero(r){
  const m=r.match(/(\d+)\s*min/i); if(m) return parseInt(m[1])*60;
  const s=r.match(/(\d+)\s*sec/i); if(s) return parseInt(s[1]);
  return 0;
}
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0'); }
function dateStr(iso){ const d=new Date(iso); return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0'); }

// ════════════════════════════════════
//  RENDER SCHEDA
// ════════════════════════════════════
function render(){
  const wKey=state.currentWorkout, w=WORKOUTS[wKey], exes=w.exercises;
  document.getElementById('cur-workout').textContent=wKey;
  document.getElementById('cur-workout-sub').textContent=w.name;
  const doneCount=exes.filter(e=>state.doneExercises[e.id]).length;
  document.getElementById('done-count').textContent=`${doneCount}/${exes.length}`;
  const list=document.getElementById('exercise-list');
  list.innerHTML='';
  exes.forEach((ex,i)=>{
    const sn=parseSerieCount(ex.serie), wt=getWeight(ex.id,ex.peso), sets=getSets(ex.id,sn), isDone=!!state.doneExercises[ex.id];
    const card=document.createElement('div');
    card.className='exercise-card'+(ex.isSuperset?' superset':'')+( isDone?' done':'');
    card.id='card-'+ex.id;
    const recBadge=ex.recupero==='Superset'
      ?`<span class="badge badge-super">SUPERSET</span>`
      :`<span class="badge badge-rec">⏱ ${ex.recupero}</span>`;
    const superTag=ex.isSuperset?`<span class="superset-tag">⚡ SUPERSET</span>`:'';
    card.innerHTML=`
      <div class="ex-header" onclick="toggleExpand('${ex.id}')">
        <div class="ex-num">${isDone?'✓':i+1}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}${ex.note?` <span style="font-size:13px;color:var(--muted)">${ex.note}</span>`:''}</div>
          <div class="ex-meta"><span class="badge badge-serie">${ex.serie}</span>${recBadge}</div>
          ${superTag}
        </div>
        <div class="ex-expand" id="arr-${ex.id}">▼</div>
      </div>
      <div class="ex-body" id="body-${ex.id}">
        <div class="weight-row">
          <span class="weight-label">PESO</span>
          <div class="weight-ctrl">
            <button class="w-btn" onclick="changeWeight('${ex.id}',${ex.peso},-2.5)">−</button>
            <input class="w-val" id="wval-${ex.id}" type="number" value="${wt}" onchange="setWeightDirect('${ex.id}',this.value)">
            <button class="w-btn" onclick="changeWeight('${ex.id}',${ex.peso},+2.5)">+</button>
          </div>
          <span class="w-unit">KG</span>
        </div>
        <div class="sets-row">
          <span class="sets-label">SERIE</span>
          ${sets.map((done,si)=>`<div class="set-dot${done?' completed':''}" id="dot-${ex.id}-${si}" onclick="toggleSet('${ex.id}',${si},${sn})">${si+1}</div>`).join('')}
        </div>
        <button class="done-btn" onclick="markDone('${ex.id}')">${isDone?'✓ COMPLETATO':'SEGNA COMPLETATO'}</button>
      </div>`;
    list.appendChild(card);
  });
}

function toggleExpand(id){
  document.getElementById('body-'+id).classList.toggle('open');
  document.getElementById('arr-'+id).classList.toggle('open');
}

function openNextExercise(doneId){
  const exes=WORKOUTS[state.currentWorkout].exercises;
  const idx=exes.findIndex(e=>e.id===doneId);
  document.getElementById('body-'+doneId)?.classList.remove('open');
  document.getElementById('arr-'+doneId)?.classList.remove('open');
  for(let i=idx+1;i<exes.length;i++){
    if(!state.doneExercises[exes[i].id]){
      const nextId=exes[i].id;
      const body=document.getElementById('body-'+nextId);
      const arr=document.getElementById('arr-'+nextId);
      if(body){ body.classList.add('open'); arr?.classList.add('open'); setTimeout(()=>{ document.getElementById('card-'+nextId)?.scrollIntoView({behavior:'smooth',block:'nearest'}); },100); }
      break;
    }
  }
}

function changeWeight(id,def,delta){
  let v=Math.max(0,Math.round((getWeight(id,def)+delta)*10)/10);
  state.weights[id]=v;
  const el=document.getElementById('wval-'+id);
  if(el) el.value=v;
  saveLocal();
  saveWeightToSupabase(id,v);
}
function setWeightDirect(id,val){
  const n=parseFloat(val);
  if(!isNaN(n)&&n>=0){ state.weights[id]=n; saveLocal(); saveWeightToSupabase(id,n); }
}

function toggleSet(id,si,total){
  const sets=getSets(id,total); sets[si]=!sets[si]; state.doneSets[id]=sets;
  const dot=document.getElementById(`dot-${id}-${si}`);
  if(dot) dot.classList.toggle('completed',sets[si]);
  if(sets[si]){
    const allEx=Object.values(WORKOUTS).flatMap(w=>w.exercises);
    const ex=allEx.find(e=>e.id===id);
    if(ex&&ex.recupero!=='Superset'){ const s=parseRecupero(ex.recupero); if(s>0) startAutoTimer(s); }
  }
  saveLocal();
}

function markDone(id){
  state.doneExercises[id]=!state.doneExercises[id];
  saveLocal(); render();
  if(state.doneExercises[id]) openNextExercise(id);
}

function nextWorkout(){
  const keys=Object.keys(WORKOUTS), i=keys.indexOf(state.currentWorkout);
  state.currentWorkout=keys[(i+1)%keys.length]; saveLocal(); render();
}

function openConfirmModal(){
  const wKey=state.currentWorkout, w=WORKOUTS[wKey], exes=w.exercises;
  document.getElementById('modal-sub').textContent=`Scheda ${wKey} — ${w.name}`;
  const sum=document.getElementById('modal-summary');
  sum.innerHTML=exes.map(ex=>{
    const isDone=!!state.doneExercises[ex.id], weight=getWeight(ex.id,ex.peso);
    return `<div class="modal-row">
      <span class="modal-ex">${ex.name}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="modal-w">${weight}kg</span>
        <span class="${isDone?'modal-done-tag':'modal-skip-tag'}">${isDone?'✓ fatto':'skip'}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

async function confirmFinish(){
  closeModal();
  const wKey=state.currentWorkout, w=WORKOUTS[wKey], exes=w.exercises;
  const weights={};
  exes.forEach(ex=>{ weights[ex.name]=getWeight(ex.id,ex.peso); });
  const entry={ date:new Date().toISOString(), workout:wKey, name:w.name, weights, doneCount:exes.filter(e=>state.doneExercises[e.id]).length, total:exes.length };
  if(!state.history) state.history=[];
  state.history.unshift(entry);
  if(state.history.length>100) state.history=state.history.slice(0,100);
  exes.forEach(ex=>{ delete state.doneExercises[ex.id]; delete state.doneSets[ex.id]; });
  saveLocal();
  await saveSessionToSupabase(entry);
  showToast('🦍 Scheda '+wKey+' salvata!');
  render();
  if(calCurrentYear&&calCurrentMonth!==undefined) renderCalendar();
  renderStats();
}

// ════════════════════════════════════
//  TIMER — background-aware
// ════════════════════════════════════
let timerTotal=120, timerEndTime=null, timerLeft=120, timerInterval=null, timerRunning=false;
const CIRC=2*Math.PI*112;
let toastTimerPending=false;
function onToastClick(){ if(toastTimerPending){ showPage('timer'); hideToast(); } }
function timerInit(){ setPreset(90); }
function setPreset(secs){ timerStop(); timerTotal=secs; timerLeft=secs; timerEndTime=null; document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active-preset')); document.querySelectorAll('.preset-btn').forEach(b=>{ if(b.textContent.trim()===fmtShort(secs)) b.classList.add('active-preset'); }); renderTimer(); }
function fmtShort(s){ if(s<60) return s+'s'; if(s%60===0) return (s/60)+'m'; return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function fmtTime(s){ s=Math.max(0,s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function renderTimer(){
  const disp=document.getElementById('timer-display'), ring=document.getElementById('timer-ring'), svg=document.getElementById('timer-svg');
  if(!disp) return;
  disp.textContent=fmtTime(timerLeft);
  const prog=timerTotal>0?timerLeft/timerTotal:1, offset=CIRC*(1-prog);
  ring.style.strokeDasharray=CIRC; ring.style.strokeDashoffset=offset;
  const fin=timerLeft<=0&&!timerRunning;
  disp.className='timer-display'+(timerRunning?' running':fin?' finished':'');
  svg.className='timer-progress'+(timerRunning?' running':fin?' finished':'');
  const btn=document.getElementById('btn-start');
  if(btn){ btn.textContent=timerRunning?'STOP':(timerLeft<timerTotal&&timerLeft>0?'RIPRENDI':'START'); btn.className='t-btn '+(timerRunning?'t-btn-stop':'t-btn-start'); }
}
function timerTick(){
  if(!timerRunning||!timerEndTime) return;
  timerLeft=Math.round((timerEndTime-Date.now())/1000);
  if(timerLeft<=0){ timerLeft=0; timerStop(); renderTimer(); onTimerDone(); } else { renderTimer(); }
}
function timerStop(){ clearInterval(timerInterval); timerRunning=false; timerInterval=null; }
function timerToggle(){
  if(timerRunning){ timerLeft=Math.round((timerEndTime-Date.now())/1000); timerStop(); }
  else { if(timerLeft<=0) timerLeft=timerTotal; timerEndTime=Date.now()+timerLeft*1000; timerRunning=true; timerInterval=setInterval(timerTick,300); }
  renderTimer();
}
function timerReset(rerender=true){ timerStop(); timerLeft=timerTotal; timerEndTime=null; if(rerender) renderTimer(); }
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&timerRunning&&timerEndTime){
    timerLeft=Math.round((timerEndTime-Date.now())/1000);
    if(timerLeft<=0){ timerLeft=0; timerStop(); renderTimer(); onTimerDone(); } else { renderTimer(); }
  }
});
function onTimerDone(){
  if(navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
  if(Notification?.permission==='granted') new Notification('GymTrack 🦍',{body:'Recupero terminato! Prossima serie 💪',icon:'icon-192.png'});
  showToast('⏰ Recupero terminato!',false);
}
function setCustomTimer(val){ const s=parseInt(val); if(s>0&&s<=600){ timerStop(); timerTotal=s; timerLeft=s; timerEndTime=null; document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active-preset')); renderTimer(); } }
function startAutoTimer(secs){ timerStop(); timerTotal=secs; timerLeft=secs; timerEndTime=Date.now()+secs*1000; timerRunning=true; timerInterval=setInterval(timerTick,300); renderTimer(); showToast('⏱ Timer '+fmtTime(secs)+' avviato!',true); }

// ════════════════════════════════════
//  CALENDAR
// ════════════════════════════════════
let calCurrentYear, calCurrentMonth;
const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT=['Lu','Ma','Me','Gi','Ve','Sa','Do'];
function initCal(){ const n=new Date(); calCurrentYear=n.getFullYear(); calCurrentMonth=n.getMonth(); }
function calPrev(){ calCurrentMonth--; if(calCurrentMonth<0){calCurrentMonth=11;calCurrentYear--;} renderCalendar(); }
function calNext(){ calCurrentMonth++; if(calCurrentMonth>11){calCurrentMonth=0;calCurrentYear++;} renderCalendar(); }
function renderCalendar(){
  document.getElementById('cal-month-title').textContent=MONTHS_IT[calCurrentMonth]+' '+calCurrentYear;
  const grid=document.getElementById('cal-grid');
  const trainedMap={};
  (state.history||[]).forEach(h=>{ const d=dateStr(h.date); if(!trainedMap[d]) trainedMap[d]=[]; trainedMap[d].push(h.workout); });
  const today=todayStr();
  let html=DAYS_IT.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const firstDay=new Date(calCurrentYear,calCurrentMonth,1).getDay();
  const startOffset=(firstDay+6)%7;
  const daysInMonth=new Date(calCurrentYear,calCurrentMonth+1,0).getDate();
  for(let i=0;i<startOffset;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=calCurrentYear+'-'+(calCurrentMonth+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
    const isTrained=!!trainedMap[key], isToday=key===today;
    const letters=isTrained?[...new Set(trainedMap[key])].join(''):'';
    html+=`<div class="cal-day${isToday?' today':''}${isTrained?' trained':''}">
      ${d}
      ${isTrained?`<span class="cal-badge">${letters}</span><span class="cal-dot"></span>`:''}
    </div>`;
  }
  grid.innerHTML=html;
  renderHistory();
}
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!state.history||state.history.length===0){ list.innerHTML='<div class="no-history">Nessun allenamento salvato ancora.<br>Forza! 🦍</div>'; return; }
  list.innerHTML=state.history.slice(0,20).map(entry=>{
    const d=new Date(entry.date);
    const ds=d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'short'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    return `<div class="history-card">
      <div class="history-date">${ds}</div>
      <div class="history-workout">Scheda ${entry.workout} — ${entry.name}</div>
      <div class="history-detail">${entry.doneCount}/${entry.total} esercizi completati</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════
//  STATS
// ════════════════════════════════════
function renderStats(){
  const hist=state.history||[];
  document.getElementById('stat-total').textContent=hist.length;
  const weekAgo=Date.now()-7*24*3600*1000;
  document.getElementById('stat-week').textContent=hist.filter(h=>new Date(h.date).getTime()>weekAgo).length;
  const days=[...new Set(hist.map(h=>dateStr(h.date)))].sort().reverse();
  let streak=0, cur=new Date(); cur.setHours(0,0,0,0);
  for(const d of days){ const dd=new Date(d); dd.setHours(0,0,0,0); const diff=Math.round((cur-dd)/(86400000)); if(diff<=1){streak++;cur=dd;}else break; }
  document.getElementById('stat-streak').textContent=streak;
  const counts={}; hist.forEach(h=>{counts[h.workout]=(counts[h.workout]||0)+1;});
  const best=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stat-best').textContent=best?best[0]:'—';
  const allEx=Object.values(WORKOUTS).flatMap(w=>w.exercises);
  document.getElementById('progress-list').innerHTML=allEx.map(ex=>{
    const cur=getWeight(ex.id,ex.peso), pct=Math.min(100,Math.round((cur/(ex.peso*1.5))*100));
    const diff=Math.round((cur-ex.peso)*10)/10;
    const diffStr=diff>0?`+${diff}kg`:diff<0?`${diff}kg`:'=';
    const col=diff>0?'var(--accent)':diff<0?'var(--accent2)':'var(--muted)';
    return `<div class="progress-item">
      <div class="progress-ex">${ex.name}</div>
      <div class="progress-row">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-weight">${cur}kg</div>
        <div style="font-size:12px;color:${col};font-family:'JetBrains Mono',monospace;min-width:40px;text-align:right;">${diffStr}</div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════
//  PAGE SWITCH
// ════════════════════════════════════
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>{ if(b.getAttribute('onclick').includes("'"+id+"'")) b.classList.add('active'); });
  if(id==='storico') renderCalendar();
  if(id==='stats') renderStats();
}

// ════════════════════════════════════
//  TOAST
// ════════════════════════════════════
let toastTimeout;
function showToast(msg,clickable=false){
  const t=document.getElementById('toast');
  toastTimerPending=clickable;
  t.textContent=msg;
  t.className='toast show'+(clickable?' clickable':'');
  clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>hideToast(),clickable?5000:2600);
}
function hideToast(){ const t=document.getElementById('toast'); t.classList.remove('show'); toastTimerPending=false; }

// ════════════════════════════════════
//  INIT
// ════════════════════════════════════
async function init(){
  loadLocal();
  const now=new Date();
  document.getElementById('today-label').textContent=now.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
  initCal(); render(); timerInit(); renderStats();

  // Auth state listener
  supa.auth.onAuthStateChange(async (event, session)=>{
    if(session?.user){
      currentUser=session.user;
      document.getElementById('user-email-label').textContent=currentUser.email.split('@')[0];
      showAuthScreen(false);
      await loadFromSupabase();
      render(); renderStats();
      if(Notification?.permission==='default') Notification.requestPermission();
    } else {
      currentUser=null;
      showAuthScreen(true);
    }
  });

  // Check existing session
  const { data:{ session } } = await supa.auth.getSession();
  if(!session) showAuthScreen(true);
}

// ════════════════════════════════════
//  EXPOSE TO WINDOW (required for type=module)
// ════════════════════════════════════
Object.assign(window, {
  showPage, authSubmit, authToggleMode, signOut, onToastClick,
  nextWorkout, toggleExpand, changeWeight, setWeightDirect,
  toggleSet, markDone, openConfirmModal, closeModal, closeModalOutside,
  confirmFinish, timerToggle, timerReset, setPreset, setCustomTimer,
  calPrev, calNext
});
init();
</script>
